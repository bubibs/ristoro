<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TECNOSISTEM Trasferte</title>
  
  <!-- Leaflet CSS for Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdib3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI0Q0QUYzNyIgZD0iTTEyIDJMMSAyMWgyMmwtMTEtMTl6bTAgMy44bDcuNSA4SDQuNWw3LjUtOHoiLz48L3N2Zz4=">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#003366">
  
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <!-- Header / Navigation -->
  <header class="app-header">
    <div class="header-content">
      <h1 class="logo">TECNOSISTEM<span class="logo-sub">Trasferte</span></h1>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
        <!-- Sun/Moon icon inserted by JS -->
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app-content">
    <!-- Views will be injected here -->
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-view="work">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
      <span>Lavoro</span>
    </button>
    <button class="nav-item" data-view="hotels">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"></path><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path><path d="M9 7h6"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></svg>
      <span>Hotel</span>
    </button>
    <button class="nav-item" data-view="restaurants">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></svg>
      <span>Pasti</span>
    </button>
  </nav>

  <!-- Templates -->
  <template id="tmpl-home">
    <div class="view home-view">
      <div class="view-header">
        <h2>Posizione e Vicinanze</h2>
      </div>
      
      <div style="margin-bottom:10px;">
         <form onsubmit="event.preventDefault(); window.app.searchCustomTarget(document.getElementById('home-target-search').value);" style="display:flex; gap:8px; margin-bottom:5px;">
            <input type="search" class="search-bar" id="home-target-search" placeholder="Cerca Città (es. Roma) + Cerca" style="margin-bottom:0; flex-grow:1;">
            <button type="button" id="home-reset-target" class="btn btn-icon" style="display:none; background:var(--surface-color); border:2px solid var(--border-color); color:var(--color-primary); border-radius:12px; padding:0 15px;" onclick="window.app.resetTargetToCurrent()" title="Torna alla mia posizione">📍</button>
         </form>
         <div id="home-target-title" style="font-size:0.9rem; color:var(--color-accent); font-weight:bold; text-align:center;"></div>
      </div>

      <div id="map-container" class="map-container">
        <div id="main-map"></div>
      </div>
      <div id="current-address" class="address-box">
        Ottengo la posizione GPS...
      </div>

      <div id="home-nearby-results" style="margin-top: 20px; display:none;">
         <h3 style="font-size:1.1rem; color:var(--text-main); margin-bottom:10px; border-bottom:1px solid var(--border-color); padding-bottom:5px;">Strutture nelle Vicinanze</h3>
         <div id="nearby-list" class="list-container"></div>
      </div>


    </div>
  </template>

  <template id="tmpl-list">
    <div class="view list-view">
      <div class="view-header">
        <h2 id="list-title">Lista</h2>
        <button class="btn btn-sm btn-accent" id="add-new-btn">+ Aggiungi</button>
      </div>
      <input type="search" id="list-search" class="search-bar" placeholder="Cerca nome, città o etichetta...">
      <div id="list-container" class="list-container">
        <!-- Items injected via JS -->
      </div>
    </div>
  </template>

  <template id="tmpl-form">
    <div class="view form-view">
      <div class="view-header">
        <button class="btn btn-icon btn-back" onclick="window.app.goBack()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <h2 id="form-title">Nuovo Luogo</h2>
      </div>
      <form id="place-form" class="form-container">
        <input type="hidden" id="place-type" name="type">
        <input type="hidden" id="place-id" name="id">
        <input type="hidden" id="place-lat" name="lat">
        <input type="hidden" id="place-lng" name="lng">
        
        <div class="form-group">
          <label>Nome Luogo</label>
          <input type="text" id="place-name" name="name" required placeholder="Es. Cantiere Alpha o Ristorante Da Mario">
        </div>

        <div class="form-group">
          <label>Indirizzo (Lascia vuoto per usare il GPS attuale)</label>
          <div class="address-input-group">
             <input type="text" id="place-address" name="address" placeholder="Via Roma 1, Milano">
             <button type="button" class="btn btn-icon get-gps-btn" id="get-gps-btn" title="Usa GPS">📍</button>
          </div>
        </div>

        <div class="form-group">
          <label>Telefono / Prenotazioni</label>
          <input type="tel" id="place-phone" name="phone" placeholder="+39 000 000 0000">
        </div>

        <div class="form-group" id="rating-group" style="display:none;">
          <label>Voto / Valutazione</label>
          <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5" /><label for="star5" title="5 stelle">☆</label>
            <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stelle">☆</label>
            <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stelle">☆</label>
            <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stelle">☆</label>
            <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 stella">☆</label>
          </div>
        </div>

        <div class="form-group">
          <label>Note aggiuntive (Opzionale)</label>
          <textarea id="place-notes" name="notes" rows="3" placeholder="Info utili..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-large btn-block">Salva</button>
      </form>
    </div>
  </template>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Firebase App & Firestore via CDN (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script src="./firebase-db.js"></script>
  
  <!-- Main App Logic -->
  <script src="./app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW Registered', reg)).catch(err => console.log('SW Error', err));
      });
    }
  </script>
</body>
</html>
